<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập Nghe hiểu Tương tác - Tiếng Anh 5</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ECC71;
            --error-color: #E74C3C;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .subtitle {
            color: #7F8C8D;
            margin-bottom: 25px;
            font-size: 16px;
        }

        /* Khối điều khiển Audio hoạt hình */
        .audio-section {
            background: #EBF5FB;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.6);
            background-color: #357ABD;
        }

        .play-btn:active {
            transform: translateY(-1px);
        }

        .track-indicator {
            font-weight: bold;
            color: #2C3E50;
            background: #FFF;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #D6E4F0;
        }

        /* Khu vực chứa vật kéo (Loa) */
        .speakers-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 80px;
            padding: 10px;
            background: #F9F9F9;
            border: 2px dashed #BDC3C7;
            border-radius: 12px;
        }

        .speaker-item {
            background: #FFF;
            border: 2px solid #BDC3C7;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .speaker-item:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* Khu vực lưới hiển thị tranh và ô thả */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            background: #FFF;
            border: 3px solid #E0E0E0;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .card-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #7F8C8D;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .illustration {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px; /* Dùng tạm Emoji hoạt hình đại diện cho tranh vẽ */
            background: #F8F9FA;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: transform 0.3s;
        }

        .card:hover .illustration {
            transform: scale(1.05);
        }

        /* Ô thả số */
        .drop-zone {
            width: 60px;
            height: 60px;
            border: 3px dashed #BDC3C7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FAFAFA;
            transition: all 0.3s ease;
        }

        .drop-zone.hovered {
            border-color: var(--primary-color);
            background: #EBF5FB;
            transform: scale(1.05);
        }

        /* Trạng thái chấm điểm Đúng / Sai */
        .card.correct {
            border-color: var(--success-color);
            background-color: #E8F8F5;
        }
        .card.correct .drop-zone {
            border-color: var(--success-color);
            background: var(--success-color);
            color: white;
        }

        .card.wrong {
            border-color: var(--error-color);
            background-color: #FDEDEC;
            animation: shake 0.4s ease-in-out;
        }
        .card.wrong .drop-zone {
            border-color: var(--error-color);
            background: var(--error-color);
            color: white;
        }

        /* Hiệu ứng rung khi trả lời sai */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Khối giải thích & Kết quả */
        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
            display: none;
            font-size: 18px;
        }

        .action-container {
            margin-top: 20px;
        }

        .check-btn {
            background-color: #2C3E50;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .check-btn:hover {
            background-color: #34495E;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>4. Listen and number. 🎧✏️</h1>
        <p class="subtitle">Kéo chiếc loa mang số thứ tự thả vào ô trống bên dưới bức tranh triệu chứng bệnh tương ứng nghe được!</p>

        <div class="audio-section">
            <div class="audio-controls">
                <button class="play-btn" id="playBtn">
                    <span>▶</span> Play Audio (Full Track)
                </button>
                <div class="track-indicator">Track 43</div>
            </div>
            <small style="color: #95A5A6;">(Âm thanh mô phỏng gồm 4 đoạn hội thoại liên tiếp ngắt quãng)</small>
        </div>

        <div class="speakers-container" id="speakersContainer">
            <div class="speaker-item" draggable="true" id="speaker-1" data-number="1">🔊1</div>
            <div class="speaker-item" draggable="true" id="speaker-2" data-number="2">🔊2</div>
            <div class="speaker-item" draggable="true" id="speaker-3" data-number="3">🔊3</div>
            <div class="speaker-item" draggable="true" id="speaker-4" data-number="4">🔊4</div>
        </div>

        <div class="grid-container">
            <div class="card" id="card-a" data-correct="3">
                <div class="card-label">a</div>
                <div class="illustration">🤒</div> <p style="font-weight: bold; margin: 5px 0 15px 0;">Sore throat</p>
                <div class="drop-zone" data-card="a"></div>
            </div>

            <div class="card" id="card-b" data-correct="1">
                <div class="card-label">b</div>
                <div class="illustration">🤢</div> <p style="font-weight: bold; margin: 5px 0 15px 0;">Stomach ache</p>
                <div class="drop-zone" data-card="b"></div>
            </div>

            <div class="card" id="card-c" data-correct="2">
                <div class="card-label">c</div>
                <div class="illustration">🤯</div> <p style="font-weight: bold; margin: 5px 0 15px 0;">Headache</p>
                <div class="drop-zone" data-card="c"></div>
            </div>

            <div class="card" id="card-d" data-correct="4">
                <div class="card-label">d</div>
                <div class="illustration">🥵</div> <p style="font-weight: bold; margin: 5px 0 15px 0;">Toothache</p>
                <div class="drop-zone" data-card="d"></div>
            </div>
        </div>

        <div class="action-container">
            <button class="check-btn" id="checkBtn">Nộp Bài / Kiểm Tra</button>
        </div>

        <div class="feedback-box" id="feedbackBox"></div>
    </div>

    <audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav"></audio>
    <audio id="soundIncorrect" src="https://assets.mixkit.co/active_storage/sfx/951/951-84.wav"></audio>
    <audio id="mainAudio" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>

    <script>
        // Cấu hình script dữ liệu hội thoại để hiển thị giải thích sau khi làm bài
        const audioScripts = {
            1: "Conversation 1: I have a stomach ache. -> Tranh (b)",
            2: "Conversation 2: I have a headache. -> Tranh (c)",
            3: "Conversation 3: I have a sore throat. -> Tranh (a)",
            4: "Conversation 4: I have a toothache. -> Tranh (d)"
        };

        const playBtn = document.getElementById('playBtn');
        const mainAudio = document.getElementById('mainAudio');
        const speakers = document.querySelectorAll('.speaker-item');
        const dropZones = document.querySelectorAll('.drop-zone');
        const checkBtn = document.getElementById('checkBtn');
        const feedbackBox = document.getElementById('feedbackBox');

        let draggedItem = null;

        // 1. Xử lý Phát Audio bài nghe
        playBtn.addEventListener('click', () => {
            // Lưu ý: Sử dụng link audio thực tế của bài học từ CD để đạt hiệu quả chính xác nhất.
            // Ở phiên bản này đang gắn tạm âm thanh hệ thống để kiểm thử.
            if (mainAudio.paused) {
                mainAudio.play();
                playBtn.innerHTML = "⏸ Pause Audio";
                playBtn.style.backgroundColor = "#e67e22";
            } else {
                mainAudio.pause();
                playBtn.innerHTML = "▶ Play Audio (Full Track)";
                playBtn.style.backgroundColor = "var(--primary-color)";
            }
        });

        // 2. Xử lý Kéo và Thả (Drag and Drop API)
        speakers.forEach(speaker => {
            speaker.addEventListener('dragstart', function(e) {
                draggedItem = this;
                setTimeout(() => this.style.display = 'none', 0);
            });

            speaker.addEventListener('dragend', function() {
                setTimeout(() => {
                    if(draggedItem) draggedItem.style.display = 'flex';
                    draggedItem = null;
                }, 0);
            });
        });

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', function(e) {
                e.preventDefault();
            });

            zone.addEventListener('dragenter', function(e) {
                e.preventDefault();
                this.classList.add('hovered');
            });

            zone.addEventListener('dragleave', function() {
                this.classList.remove('hovered');
            });

            zone.addEventListener('drop', function(e) {
                this.classList.remove('hovered');
                if (draggedItem) {
                    // Nếu ô đã có sẵn số, trả số cũ về khay ban đầu
                    if(this.children.length > 0) {
                        document.getElementById('speakersContainer').appendChild(this.children[0]);
                    }
                    this.appendChild(draggedItem);
